version: "3.8"

services:

  mysql:
    image: mysql:8.0
    container_name: bilibili-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: bilibili
      MYSQL_USER: huangnv
      MYSQL_PASSWORD: 11447
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./src/main/resources/bilibili.sql:/docker-entrypoint-initdb.d/bilibili.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: bilibili-app
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8080"
    volumes:
      - bilibili_storage:/data/bilibili-data

  redis:
    image: redis:7-alpine
    container_name: bilibili-redis
    restart: always
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:1.28-alpine
    container_name: bilibili-nginx
    restart: always
    depends_on:
      - app
    ports:
      - "8080:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - bilibili_storage:/data/bilibili-data:ro

volumes:
  mysql_data:
  bilibili_storage:
  redis_data:
