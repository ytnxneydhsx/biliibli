spring:
  application:
    name: bilibili_SpringBoot
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://mysql:3306/bilibili?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=utf8}
    username: ${DB_USERNAME:}
    password: ${DB_PASSWORD:}
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
  servlet:
    multipart:
      max-file-size: 2GB
      max-request-size: 2GB
  sql:
    init:
      mode: never
      schema-locations: classpath:bilibili.sql
      encoding: UTF-8
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
    locations: classpath:db/migration
  rabbitmq:
    host: ${RABBITMQ_HOST:rabbitmq}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VHOST:/}

server:
  forward-headers-strategy: framework
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

mybatis-plus:
  mapper-locations: classpath*:mapper/*.xml

jwt:
  secret: ${JWT_SECRET:change-this-secret-at-least-32-bytes-long}
  expireSeconds: 604800

cors:
  allowedOrigins: http://localhost:63342,http://127.0.0.1:63342,http://localhost:8080,http://127.0.0.1:8080

storage:
  avatar:
    maxSize: 2097152
  cover:
    maxSize: 5242880
  video:
    maxSize: 2147483648
    chunkSize: 10485760
  allowedImageTypes: image/jpeg,image/png,image/webp
  allowedVideoTypes: video/mp4,video/quicktime,video/webm,video/x-m4v,video/x-matroska,video/ogg
  allowedVideoExtensions: .mp4,.mov,.webm,.m4v,.mkv,.ogv

minio:
  endpoint: ${MINIO_ENDPOINT:http://minio:9000}
  publicEndpoint: ${MINIO_PUBLIC_ENDPOINT:http://localhost:9000}
  accessKey: ${MINIO_ACCESS_KEY:minioadmin}
  secretKey: ${MINIO_SECRET_KEY:minioadmin}
  region: ${MINIO_REGION:us-east-1}
  bucket: ${MINIO_BUCKET:bilibili-media}
  avatarPrefix: ${MINIO_AVATAR_PREFIX:avatar}
  coverPrefix: ${MINIO_COVER_PREFIX:cover}
  videoPrefix: ${MINIO_VIDEO_PREFIX:video}
  partUrlExpireSeconds: ${MINIO_PART_URL_EXPIRE_SECONDS:1800}
  sessionExpireHours: ${MINIO_SESSION_EXPIRE_HOURS:24}
  corsAllowedOrigins: ${MINIO_CORS_ALLOWED_ORIGINS:http://localhost:63342,http://127.0.0.1:63342,http://localhost:8080,http://127.0.0.1:8080}

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

app:
  docs:
    public: false
  im:
    mq:
      enabled: false
      exchange: im.message.exchange
      routingKey: im.message.dispatch
      realtimePushQueue: im.message.realtime.queue
      messagePersistQueue: im.message.persist.queue
      conversationProjectionQueue: im.message.conversation.queue
    websocket:
      enabled: true
      path: /ws/im
      allowedOrigins: http://localhost:63342,http://127.0.0.1:63342,http://localhost:8080,http://127.0.0.1:8080
  video:
    rankSize: 100
    switchIntervalMinutes: 5
    activeWindowMinutes: 5
    copyBatchSize: 100
    flushBatchSize: 100
