
jdbc.driver=com.mysql.cj.jdbc.Driver

jdbc.url=jdbc:mysql://localhost:3306/bilibili?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=utf8
jdbc.username=huangnv
jdbc.password=11447
jdbc.initScript=bilibili.sql


jdbc.initialSize=5
jdbc.maxActive=20
jdbc.maxWait=60000
jdbc.minIdle=5

# ===========================
# File storage (V1)
# ===========================
# Local disk root directory. Keep consistent with Nginx alias target.
storage.rootDir=F:/bilibili-data

# Public URL prefix exposed by Nginx.
storage.publicBaseUrl=http://localhost:9000/media

# Sub directories under rootDir.
storage.avatarSubDir=avatar
storage.coverSubDir=cover
storage.videoSubDir=video

# File size limits (bytes)
storage.avatar.maxSize=2097152
storage.cover.maxSize=5242880
storage.video.maxSize=2147483648

# Allowed content types
storage.allowedImageTypes=image/jpeg,image/png,image/webp
storage.allowedVideoTypes=video/mp4

# ===========================
# JWT (V2 Security)
# ===========================
jwt.secret=replace-with-at-least-32-byte-secret-value
jwt.expireSeconds=604800

# ===========================
# CORS
# ===========================
cors.allowedOrigins=http://localhost:63342,http://127.0.0.1:63342,http://localhost:8080,http://127.0.0.1:8080
